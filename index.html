<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BAGER IoT</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:   #0a0a0a;
      --black2:  #111111;
      --black3:  #1a1a1a;
      --yellow:  #f5c400;
      --yellow2: #e0b000;
      --yellow3: #ffd740;
      --red:     #e53935;
      --green:   #00c853;
      --gray:    #2a2a2a;
      --text:    #f0f0f0;
      --textdim: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--yellow);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid #000;
    }

    .logo {
      font-family: 'Black Ops One', cursive;
      font-size: 1.4rem;
      color: #000;
      letter-spacing: 3px;
    }

    .logo span { color: #333; font-size: 0.7rem; display: block; letter-spacing: 2px; margin-top: -2px; }

    .status-row { display: flex; gap: 8px; align-items: center; }

    .badge {
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 4px 8px;
      border: 2px solid #000;
      font-family: 'Share Tech Mono', monospace;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .badge.ok   { background: var(--green); color: #000; }
    .badge.off  { background: var(--red);   color: #fff; }
    .badge.wait { background: #888;         color: #000; }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: #000; }
    .badge.ok .dot   { animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── MAIN ── */
    main { padding: 12px; display: flex; flex-direction: column; gap: 12px; max-width: 700px; margin: 0 auto; }

    /* ── SECTION ── */
    .section-label {
      font-family: 'Black Ops One', cursive;
      font-size: 0.65rem;
      letter-spacing: 4px;
      color: var(--yellow);
      border-left: 4px solid var(--yellow);
      padding-left: 8px;
      margin-bottom: 8px;
    }

    /* ── CARD ── */
    .card {
      background: var(--black2);
      border: 2px solid var(--black3);
      padding: 12px;
    }

    /* ── HOLD BUTTON ── */
    .btn-row { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 18px 8px;
      font-family: 'Black Ops One', cursive;
      font-size: 1rem;
      letter-spacing: 2px;
      border: 3px solid var(--yellow);
      background: var(--black3);
      color: var(--yellow);
      cursor: pointer;
      user-select: none;
      transition: background 0.05s, transform 0.05s;
      -webkit-user-select: none;
      touch-action: none;
    }

    .btn:active,
    .btn.pressed {
      background: var(--yellow);
      color: #000;
      transform: scale(0.97);
    }

    .btn.red-btn {
      border-color: var(--red);
      color: var(--red);
    }
    .btn.red-btn.pressed,
    .btn.red-btn:active {
      background: var(--red);
      color: #fff;
    }

    /* ── GUSJENICE — special 2x2 layout ── */
    .drive-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 8px;
    }

    .drive-grid .btn-fwd { grid-column: 1 / 3; }

    /* ── SLIDER ── */
    .slider-wrap { padding: 4px 0 8px; }
    .slider-label { font-size: 0.65rem; color: var(--textdim); margin-bottom: 6px; letter-spacing: 1px; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%; height: 8px;
      background: var(--gray);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px;
      background: var(--yellow);
      border: 3px solid #000;
      cursor: pointer;
    }
    .slider-val {
      text-align: center;
      font-size: 1.2rem;
      color: var(--yellow);
      margin-top: 6px;
    }

    /* ── SVJETLO TOGGLE ── */
    .toggle-btn {
      width: 100%;
      padding: 16px;
      font-family: 'Black Ops One', cursive;
      font-size: 1rem;
      letter-spacing: 3px;
      border: 3px solid var(--yellow);
      background: var(--black3);
      color: var(--yellow);
      cursor: pointer;
      transition: all 0.1s;
    }
    .toggle-btn.on {
      background: var(--yellow);
      color: #000;
    }

    /* ── ESTOP ── */
    #btn-estop {
      width: 100%;
      padding: 20px;
      font-family: 'Black Ops One', cursive;
      font-size: 1.1rem;
      letter-spacing: 4px;
      background: var(--black3);
      border: 4px solid var(--red);
      color: var(--red);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    #btn-estop::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 8px,
        rgba(229,57,53,0.05) 8px, rgba(229,57,53,0.05) 16px);
    }
    #btn-estop:active {
      background: var(--red);
      color: #fff;
    }

    /* ── LOG ── */
    #log {
      background: #050505;
      border: 1px solid #222;
      padding: 8px;
      height: 100px;
      overflow-y: auto;
      font-size: 0.65rem;
      line-height: 1.6;
    }
    .le { display: flex; gap: 8px; }
    .lt { color: var(--textdim); }
    .lm.s { color: var(--green); }
    .lm.e { color: var(--red); }
    .lm.w { color: #f5a623; }
    .lm.i { color: #888; }
    .lm.tx { color: var(--yellow); }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.6rem;
      color: var(--textdim);
      letter-spacing: 2px;
      border-top: 2px solid var(--black3);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    BAGER IoT
    <span>KONTROLNA TABLA v1.1</span>
  </div>
  <div class="status-row">
    <div id="ws-badge" class="badge wait"><div class="dot"></div><span id="ws-txt">SERVER</span></div>
    <div id="bager-badge" class="badge off"><div class="dot"></div><span id="bager-txt">BAGER</span></div>
  </div>
</header>

<main>

  <!-- ESTOP -->
  <button id="btn-estop" onclick="emergencyStop()">⬡ EMERGENCY STOP ⬡</button>

  <!-- GUSJENICE -->
  <div>
    <div class="section-label">GUSJENICE</div>
    <div class="card">
      <div class="btn-row">
        <div style="flex:1">
          <div style="font-size:0.6rem;color:var(--textdim);margin-bottom:6px;letter-spacing:1px;">LIJEVO</div>
          <div class="btn-row">
            <button class="btn" data-motor="gusjenica_lijevo" data-val="255">▲</button>
            <button class="btn" data-motor="gusjenica_lijevo" data-val="-255">▼</button>
          </div>
        </div>
        <div style="flex:1">
          <div style="font-size:0.6rem;color:var(--textdim);margin-bottom:6px;letter-spacing:1px;">DESNO</div>
          <div class="btn-row">
            <button class="btn" data-motor="gusjenica_desno" data-val="255">▲</button>
            <button class="btn" data-motor="gusjenica_desno" data-val="-255">▼</button>
          </div>
        </div>
      </div>
      <!-- Oba naprijed/nazad -->
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn" data-motor="oba" data-val="255" style="padding:14px;">◀◀ OBA NAPRIJED</button>
        <button class="btn" data-motor="oba" data-val="-255" style="padding:14px;">OBA NAZAD ▶▶</button>
      </div>
    </div>
  </div>

  <!-- RUKA -->
  <div>
    <div class="section-label">SEGMENTI RUKE</div>
    <div class="card" style="display:flex;flex-direction:column;gap:8px;">

      <div>
        <div style="font-size:0.6rem;color:var(--textdim);margin-bottom:6px;">SEG 1</div>
        <div class="btn-row">
          <button class="btn" data-motor="ruka1" data-val="255">▲ GOR</button>
          <button class="btn" data-motor="ruka1" data-val="-255">▼ DOL</button>
        </div>
      </div>

      <div>
        <div style="font-size:0.6rem;color:var(--textdim);margin-bottom:6px;">SEG 2</div>
        <div class="btn-row">
          <button class="btn" data-motor="ruka2" data-val="255">▲ GOR</button>
          <button class="btn" data-motor="ruka2" data-val="-255">▼ DOL</button>
        </div>
      </div>

      <div>
        <div style="font-size:0.6rem;color:var(--textdim);margin-bottom:6px;">SEG 3</div>
        <div class="btn-row">
          <button class="btn" data-motor="ruka3" data-val="255">▲ GOR</button>
          <button class="btn" data-motor="ruka3" data-val="-255">▼ DOL</button>
        </div>
      </div>

      <div>
        <div style="font-size:0.6rem;color:var(--textdim);margin-bottom:6px;">SEG 4</div>
        <div class="btn-row">
          <button class="btn" data-motor="ruka4" data-val="255">▲ GOR</button>
          <button class="btn" data-motor="ruka4" data-val="-255">▼ DOL</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ROTACIJA -->
  <div>
    <div class="section-label">ROTACIJA KABINE</div>
    <div class="card">
      <div class="btn-row">
        <button class="btn" data-motor="rotacija" data-val="255">↺ LIJEVO</button>
        <button class="btn" data-motor="rotacija" data-val="-255">DESNO ↻</button>
      </div>
    </div>
  </div>

  <!-- KASIKA -->
  <div>
    <div class="section-label">KASIKA</div>
    <div class="card">
      <div class="btn-row" style="margin-bottom:10px;">
        <button class="btn" data-motor="kasika_btn" data-val="255">▲ OTVORI</button>
        <button class="btn" data-motor="kasika_btn" data-val="-255">▼ ZATVORI</button>
      </div>
      <div class="slider-wrap">
        <div class="slider-label">PRECIZNA POZICIJA</div>
        <input type="range" id="servo-slider" min="0" max="180" value="90">
        <div class="slider-val" id="servo-val">90°</div>
      </div>
    </div>
  </div>

  <!-- SVJETLO -->
  <div>
    <div class="section-label">SVJETLO</div>
    <div class="card">
      <button class="toggle-btn" id="svjetlo-btn" onclick="toggleSvjetlo()">💡 SVJETLO — OFF</button>
    </div>
  </div>

  <!-- LOG -->
  <div>
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;padding-right:4px;">
      LOG
      <span onclick="document.getElementById('log').innerHTML=''" style="cursor:pointer;font-size:0.6rem;color:var(--textdim);">CLEAR</span>
    </div>
    <div id="log"></div>
  </div>

</main>

<footer>BAGER IOT © 2025 · MOSTAR</footer>

<script>
"use strict";

const CONFIG = {
  SERVER_URL: window.location.protocol === "https:"
    ? `wss://${window.location.host}`
    : `ws://${window.location.host}`,
  API_TOKEN: "dev-token-insecure",
  HOLD_INTERVAL_MS: 100,   // šalje komandu svakih 100ms dok se drži
};

// ── STATE ──────────────────────────────────────────────
let ws = null;
let svjetloOn = false;
let servoVal  = 90;
let holdTimers = {};

// ── LOG ────────────────────────────────────────────────
function log(type, msg) {
  const el  = document.getElementById("log");
  const t   = new Date().toLocaleTimeString("bs-BA", { hour12: false });
  el.innerHTML += `<div class="le"><span class="lt">${t}</span><span class="lm ${type}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 80) el.removeChild(el.firstChild);
}

// ── WS ─────────────────────────────────────────────────
function connectWS() {
  const url = `${CONFIG.SERVER_URL}?token=${CONFIG.API_TOKEN}`;
  setWS("wait");
  try { ws = new WebSocket(url); } catch(e) {
    log("e", "WS greška: " + e.message);
    setTimeout(connectWS, 5000); return;
  }

  ws.onopen = () => {
    setWS("ok");
    log("s", "Spojen na server!");
  };

  ws.onmessage = (ev) => {
    try {
      const m = JSON.parse(ev.data);
      if (m.type === "init" || m.type === "heartbeat") setBager(m.bager);
      if (m.type === "bager_status") setBager(m.online);
      if (m.type === "mqtt_status" && !m.connected) log("w", "MQTT offline");
      if (m.type === "emergency_stop") log("e", "⚠ ESTOP aktiviran!");
    } catch(e) {}
  };

  ws.onclose = (e) => {
    setWS("off"); setBager(false);
    log("w", `WS prekinut (${e.code}). Reconnect za 5s...`);
    setTimeout(connectWS, 5000);
  };

  ws.onerror = () => log("e", "WS greška — pokreni server.js!");
}

function send(motorId, value) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: "motor_command", motorId, value }));
}

// ── STATUS UI ──────────────────────────────────────────
function setWS(state) {
  const b = document.getElementById("ws-badge");
  const t = document.getElementById("ws-txt");
  b.className = `badge ${state === "ok" ? "ok" : state === "off" ? "off" : "wait"}`;
  t.textContent = state === "ok" ? "SERVER OK" : state === "off" ? "OFFLINE" : "SPAJANJE";
}

function setBager(online) {
  const b = document.getElementById("bager-badge");
  const t = document.getElementById("bager-txt");
  b.className = `badge ${online ? "ok" : "off"}`;
  t.textContent = online ? "BAGER ON" : "BAGER OFF";
}

// ── HOLD BUTTONS ───────────────────────────────────────
function startHold(motorId, value) {
  if (holdTimers[motorId]) return;
  // Pošalji odmah
  if (motorId === "oba") {
    send("gusjenica_lijevo", value);
    send("gusjenica_desno", value);
  } else if (motorId === "kasika_btn") {
    // Kasika hold — šalje relativne vrijednosti
    let current = servoVal;
    const dir = value > 0 ? 1 : -1;
    holdTimers[motorId] = setInterval(() => {
      current = Math.max(0, Math.min(180, current + dir * 3));
      servoVal = current;
      document.getElementById("servo-slider").value = current;
      document.getElementById("servo-val").textContent = current + "°";
      send("servo_kasika", current);
    }, CONFIG.HOLD_INTERVAL_MS);
    return;
  } else {
    send(motorId, value);
  }

  holdTimers[motorId] = setInterval(() => {
    if (motorId === "oba") {
      send("gusjenica_lijevo", value);
      send("gusjenica_desno", value);
    } else {
      send(motorId, value);
    }
  }, CONFIG.HOLD_INTERVAL_MS);
}

function stopHold(motorId) {
  if (holdTimers[motorId]) {
    clearInterval(holdTimers[motorId]);
    holdTimers[motorId] = null;
  }
  if (motorId === "oba") {
    send("gusjenica_lijevo", 0);
    send("gusjenica_desno", 0);
  } else if (motorId === "kasika_btn") {
    // ne šaljemo stop za servo
  } else {
    send(motorId, 0);
  }
}

// ── BIND HOLD EVENTS ───────────────────────────────────
document.querySelectorAll(".btn").forEach(btn => {
  const motorId = btn.dataset.motor;
  const value   = parseInt(btn.dataset.val);

  const press = () => { btn.classList.add("pressed"); startHold(motorId, value); };
  const release = () => { btn.classList.remove("pressed"); stopHold(motorId); };

  btn.addEventListener("mousedown",  press);
  btn.addEventListener("touchstart", (e) => { e.preventDefault(); press(); }, { passive: false });
  btn.addEventListener("mouseup",    release);
  btn.addEventListener("mouseleave", release);
  btn.addEventListener("touchend",   release);
  btn.addEventListener("touchcancel",release);
});

// ── SERVO SLIDER ───────────────────────────────────────
document.getElementById("servo-slider").addEventListener("input", (e) => {
  servoVal = parseInt(e.target.value);
  document.getElementById("servo-val").textContent = servoVal + "°";
  send("servo_kasika", servoVal);
});

// ── SVJETLO ────────────────────────────────────────────
function toggleSvjetlo() {
  svjetloOn = !svjetloOn;
  send("svjetlo", svjetloOn ? 1 : 0);
  const btn = document.getElementById("svjetlo-btn");
  btn.textContent = `💡 SVJETLO — ${svjetloOn ? "ON" : "OFF"}`;
  btn.className = `toggle-btn ${svjetloOn ? "on" : ""}`;
  log(svjetloOn ? "s" : "w", `Svjetlo: ${svjetloOn ? "ON" : "OFF"}`);
}

// ── EMERGENCY STOP ─────────────────────────────────────
function emergencyStop() {
  Object.keys(holdTimers).forEach(k => {
    clearInterval(holdTimers[k]);
    holdTimers[k] = null;
  });
  document.querySelectorAll(".btn").forEach(b => b.classList.remove("pressed"));
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "emergency_stop" }));
  }
  log("e", "⚠⚠⚠ EMERGENCY STOP!");
}

// ── START ──────────────────────────────────────────────
connectWS();
</script>
</body>
</html>
