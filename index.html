<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Bager IoT</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
   
    :root {
      --bg:       #0e0e0e;
      --bg2:      #161616;
      --bg3:      #1e1e1e;
      --border:   #2a2a2a;
      --yellow:   #f0c000;
      --yellowd:  #c09800;
      --red:      #cc3333;
      --green:    #2ecc71;
      --white:    #ebebeb;
      --dim:      #555;
      --font:     'IBM Plex Mono', monospace;
      --title:    'Bebas Neue', cursive;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 13px;
    }

    /* header - ljepljiv gore, žut */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: var(--yellow);
      border-bottom: 3px solid #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .site-title {
      font-family: var(--title);
      font-size: 1.6rem;
      letter-spacing: 4px;
      color: #000;
      line-height: 1;
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    /* status pillovi - zeleni kad radi, crveni kad ne */
    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.15);
      border: 1px solid rgba(0,0,0,0.3);
      padding: 4px 10px;
      font-size: 0.65rem;
      letter-spacing: 1px;
      color: #000;
      font-weight: 600;
    }

    .pill.bad  { background: var(--red);   color: #fff; border-color: var(--red); }
    .pill.good { background: #000; color: var(--yellow); border-color: #000; }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .pill.good .dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* traka s temperaturom ispod headera */
    .temp-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.7rem;
      letter-spacing: 1px;
      color: var(--dim);
    }
    .temp-val { color: var(--yellow); font-size: 1rem; font-weight: 600; }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 14px 12px 80px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* naslov sekcije */
    .sec-title {
      font-family: var(--title);
      font-size: 0.85rem;
      letter-spacing: 4px;
      color: var(--yellow);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sublabel {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--dim);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    /* dugmad koja reaguju na hold */
    .btn-row { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 16px 6px;
      font-family: var(--title);
      font-size: 1.05rem;
      letter-spacing: 2px;
      background: var(--bg3);
      border: 2px solid var(--yellow);
      color: var(--yellow);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background 0.06s, color 0.06s;
    }

    .btn.active,
    .btn:active { background: var(--yellow); color: #000; }

    /* toggle za svjetlo */
    .toggle {
      width: 100%;
      padding: 14px;
      font-family: var(--title);
      font-size: 1rem;
      letter-spacing: 3px;
      background: var(--bg3);
      border: 2px solid var(--border);
      color: var(--dim);
      cursor: pointer;
      transition: all 0.1s;
    }
    .toggle.on { background: var(--yellow); border-color: var(--yellow); color: #000; }

    /* slider za servo */
    .slider-section { display: flex; flex-direction: column; gap: 6px; }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px;
      background: var(--yellow);
      border: 2px solid #000;
      cursor: pointer;
    }

    .servo-readout { display: flex; justify-content: space-between; align-items: center; }
    .servo-deg { font-size: 1.4rem; color: var(--yellow); font-weight: 600; }

    /* emergency stop dugme */
    #estop {
      width: 100%;
      padding: 18px;
      font-family: var(--title);
      font-size: 1.2rem;
      letter-spacing: 5px;
      background: var(--bg2);
      border: 3px solid var(--red);
      color: var(--red);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    #estop::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 6px,
        rgba(204,51,51,0.04) 6px, rgba(204,51,51,0.04) 12px
      );
    }
    #estop:active { background: var(--red); color: #fff; }

    /* log na dnu */
    #log {
      background: #090909;
      border: 1px solid var(--border);
      padding: 8px 10px;
      height: 90px;
      overflow-y: auto;
      font-size: 0.65rem;
      line-height: 1.7;
      color: var(--dim);
    }
    .log-line { display: flex; gap: 8px; }
    .log-t { color: #333; flex-shrink: 0; }
    .log-s { color: var(--green); }
    .log-e { color: var(--red); }
    .log-w { color: #c8a020; }
    .log-i { color: #444; }

    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 0.6rem;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .clear-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  </style>
</head>
<body>

<header>
  <div class="site-title">BAGER IoT</div>
  <div class="header-right">
    <div class="pill" id="pill-srv"><div class="dot"></div><span id="txt-srv">SERVER</span></div>
    <div class="pill" id="pill-bag"><div class="dot"></div><span id="txt-bag">BAGER</span></div>
  </div>
</header>

<div class="temp-bar">
  <span>TEMPERATURA</span>
  <span class="temp-val" id="temp-val">— °C</span>
  <span>VLAGA</span>
  <span class="temp-val" id="hum-val">— %</span>
</div>

<main>

  <button id="estop" onclick="emergencyStop()">⚠ EMERGENCY STOP ⚠</button>

  <!-- gusjenice - hold dugmad -->
  <div>
    <div class="sec-title">Gusjenice</div>
    <div class="card">
      <div class="sublabel">Lijeva gusjenica</div>
      <div class="btn-row">
        <button class="btn" data-m="gusjenica_lijevo" data-v="255">NAPRIJED</button>
        <button class="btn" data-m="gusjenica_lijevo" data-v="-255">NAZAD</button>
      </div>
      <div class="sublabel">Desna gusjenica</div>
      <div class="btn-row">
        <button class="btn" data-m="gusjenica_desno" data-v="255">NAPRIJED</button>
        <button class="btn" data-m="gusjenica_desno" data-v="-255">NAZAD</button>
      </div>
      <div class="sublabel">Obje gusjenice</div>
      <div class="btn-row">
        <button class="btn" data-m="oba" data-v="255">OBA NAPRIJED</button>
        <button class="btn" data-m="oba" data-v="-255">OBA NAZAD</button>
      </div>
    </div>
  </div>

  <!-- segmenti ruke -->
  <div>
    <div class="sec-title">Segmenti ruke</div>
    <div class="card">
      <div class="sublabel">Segment 1</div>
      <div class="btn-row">
        <button class="btn" data-m="ruka1" data-v="255">GORE</button>
        <button class="btn" data-m="ruka1" data-v="-255">DOLE</button>
      </div>
      <div class="sublabel">Segment 2</div>
      <div class="btn-row">
        <button class="btn" data-m="ruka2" data-v="255">GORE</button>
        <button class="btn" data-m="ruka2" data-v="-255">DOLE</button>
      </div>
      <div class="sublabel">Segment 3</div>
      <div class="btn-row">
        <button class="btn" data-m="ruka3" data-v="255">GORE</button>
        <button class="btn" data-m="ruka3" data-v="-255">DOLE</button>
      </div>
      <div class="sublabel">Segment 4</div>
      <div class="btn-row">
        <button class="btn" data-m="ruka4" data-v="255">GORE</button>
        <button class="btn" data-m="ruka4" data-v="-255">DOLE</button>
      </div>
    </div>
  </div>

  <!-- rotacija kabine -->
  <div>
    <div class="sec-title">Rotacija kabine</div>
    <div class="card">
      <div class="btn-row">
        <button class="btn" data-m="rotacija" data-v="255">↺ LIJEVO</button>
        <button class="btn" data-m="rotacija" data-v="-255">DESNO ↻</button>
      </div>
    </div>
  </div>

  <!-- kasika - hold za pomicanje, slider za precizno -->
  <div>
    <div class="sec-title">Kasika</div>
    <div class="card">
      <div class="sublabel">Drži za pomicanje</div>
      <div class="btn-row">
        <button class="btn" data-m="kasika_btn" data-v="1">OTVORI</button>
        <button class="btn" data-m="kasika_btn" data-v="-1">ZATVORI</button>
      </div>
      <div class="slider-section">
        <div class="sublabel">Precizna pozicija</div>
        <input type="range" id="servo-slider" min="0" max="180" value="90">
        <div class="servo-readout">
          <span style="color:var(--dim);font-size:0.6rem;">0°</span>
          <span class="servo-deg" id="servo-deg">90°</span>
          <span style="color:var(--dim);font-size:0.6rem;">180°</span>
        </div>
      </div>
    </div>
  </div>

  <!-- svjetlo - toggle on/off -->
  <div>
    <div class="sec-title">Svjetlo</div>
    <div class="card">
      <button class="toggle" id="svjetlo-btn" onclick="toggleSvjetlo()">SVJETLO — ISKLJUČENO</button>
    </div>
  </div>

  <!-- log poruka -->
  <div>
    <div class="log-header">
      <div class="sec-title" style="margin:0;border:none;padding:0;">Log</div>
      <button class="clear-btn" onclick="clearLog()">OBRIŠI</button>
    </div>
    <div id="log"></div>
  </div>

</main>

<script>
"use strict";

// konfiguracija - automatski detektuje http vs https za ws/wss
const CONFIG = {
  SERVER_URL: window.location.protocol === "https:"
    ? `wss://${window.location.host}`
    : `ws://${window.location.host}`,
  TOKEN  : "dev-token-insecure",
  HOLD_MS: 80,
};

let ws        = null;
let svjetloOn = false;
let servoPos  = 90;
let holdTimers = {};

// log funkcija - tip: s=success, e=error, w=warn, i=info
function log(type, msg) {
  const el  = document.getElementById("log");
  const t   = new Date().toLocaleTimeString("bs-BA", { hour12: false });
  const div = document.createElement("div");
  div.className = "log-line";
  div.innerHTML = `<span class="log-t">${t}</span><span class="log-${type}">${msg}</span>`;
  el.appendChild(div);
  while (el.children.length > 60) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function clearLog() { document.getElementById("log").innerHTML = ""; }

// WebSocket konekcija - reconnect automatski svakih 5s
function connect() {
  setStatus("srv", false, "SPAJANJE");
  try { ws = new WebSocket(`${CONFIG.SERVER_URL}?token=${CONFIG.TOKEN}`); }
  catch(e) { log("e", "WS greška"); setTimeout(connect, 5000); return; }

  ws.onopen = () => {
    setStatus("srv", true, "SERVER OK");
    log("s", "Spojen na server");
  };

  ws.onmessage = (ev) => {
    try {
      const m = JSON.parse(ev.data);
      if (m.type === "init" || m.type === "heartbeat") {
        setStatus("bag", m.bager, m.bager ? "BAGER ON" : "OFFLINE");
        if (m.temperatura) updateTemp(m.temperatura.temp, m.temperatura.hum);
      }
      if (m.type === "bager_status")   setStatus("bag", m.online, m.online ? "BAGER ON" : "OFFLINE");
      if (m.type === "temperatura")    updateTemp(m.temp, m.hum);
      if (m.type === "emergency_stop") log("e", "⚠ EMERGENCY STOP aktiviran");
    } catch(e) {}
  };

  ws.onclose = (e) => {
    setStatus("srv", false, "OFFLINE");
    setStatus("bag", false, "OFFLINE");
    log("w", `Veza prekinuta (${e.code}). Reconnect za 5s...`);
    setTimeout(connect, 5000);
  };

  ws.onerror = () => log("e", "WS greška — pokreni server.js");
}

// šalje motor komandu serveru
function send(motorId, value) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: "motor_command", motorId, value }));
}

// mijenja izgled status pilla
function setStatus(which, ok, text) {
  document.getElementById(`pill-${which}`).className = `pill ${ok ? "good" : "bad"}`;
  document.getElementById(`txt-${which}`).textContent = text;
}

function updateTemp(temp, hum) {
  document.getElementById("temp-val").textContent = temp != null ? temp.toFixed(1) + " °C" : "— °C";
  document.getElementById("hum-val").textContent  = hum  != null ? hum.toFixed(1)  + " %"  : "— %";
}

// hold logika - šalje komande dok je dugme pritisnuto
function startHold(motorId, value) {
  if (holdTimers[motorId]) return;

  const fire = () => {
    if (motorId === "oba") {
      send("gusjenica_lijevo", value);
      send("gusjenica_desno",  value);
    } else if (motorId === "kasika_btn") {
      // kasika se pomjera postepeno dok držiš
      servoPos = Math.max(0, Math.min(180, servoPos + value * 3));
      document.getElementById("servo-slider").value = servoPos;
      document.getElementById("servo-deg").textContent = servoPos + "°";
      send("servo_kasika", servoPos);
    } else {
      send(motorId, value);
    }
  };

  fire();
  holdTimers[motorId] = setInterval(fire, CONFIG.HOLD_MS);
}

function stopHold(motorId) {
  if (!holdTimers[motorId]) return;
  clearInterval(holdTimers[motorId]);
  holdTimers[motorId] = null;

  if (motorId === "oba") {
    send("gusjenica_lijevo", 0);
    send("gusjenica_desno",  0);
  } else if (motorId === "kasika_btn") {
    // servo ostaje gdje je, ne šaljemo nulu
  } else {
    send(motorId, 0);
  }
}

// bind svih hold dugmadi - radi i na touchu i na mišu
document.querySelectorAll(".btn").forEach(btn => {
  const m = btn.dataset.m;
  const v = parseInt(btn.dataset.v);

  const press   = (e) => { e.preventDefault(); btn.classList.add("active");    startHold(m, v); };
  const release = ()  => {                      btn.classList.remove("active"); stopHold(m);     };

  btn.addEventListener("mousedown",   press,   { passive: false });
  btn.addEventListener("touchstart",  press,   { passive: false });
  btn.addEventListener("mouseup",     release);
  btn.addEventListener("mouseleave",  release);
  btn.addEventListener("touchend",    release);
  btn.addEventListener("touchcancel", release);
});

// servo slider - šalje direktno pri pomicanju
document.getElementById("servo-slider").addEventListener("input", (e) => {
  servoPos = parseInt(e.target.value);
  document.getElementById("servo-deg").textContent = servoPos + "°";
  send("servo_kasika", servoPos);
});

// svjetlo toggle
function toggleSvjetlo() {
  svjetloOn = !svjetloOn;
  send("svjetlo", svjetloOn ? 1 : 0);
  const btn = document.getElementById("svjetlo-btn");
  btn.textContent = `SVJETLO — ${svjetloOn ? "UKLJUČENO" : "ISKLJUČENO"}`;
  btn.className   = `toggle ${svjetloOn ? "on" : ""}`;
}

// emergency stop - zaustavlja sve i šalje na server
function emergencyStop() {
  Object.keys(holdTimers).forEach(k => { clearInterval(holdTimers[k]); holdTimers[k] = null; });
  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: "emergency_stop" }));
  log("e", "⚠⚠⚠ EMERGENCY STOP!");
}

connect();
</script>
</body>
</html>
